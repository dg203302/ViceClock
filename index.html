<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViceClock</title>
    <link rel="stylesheet" href="styles/Styles_indice.css">
</head>
<body>
    <div id="contenido">
        <h1>ViceClock</h1>
        <h1> Grand Theft 6 Release Date:<br>19/11/2026</h1>
        <h2> Countdown to release</h2>
        <div id="Conteo">
            <h2 id="Horas">00 Hours</h2>
            <h2 id="Dias">000 Days</h2>
            <h2 id="Meses">00 Months</h2>
        </div>
    </div>

    <div id="credits">
        <a href="https://diegogarcia-dev.com.ar">&copy; DiegoGarcia <span id="yr"></span></a>
        <p>Grand Theft Auto VI is a game developed and published by Rockstar Games. This is an unofficial Website/App.</p>
    </div>
    <script>
        window.onload = () =>{
            const date = new Date().getFullYear()
            document.getElementById("yr").innerText = date
        }
    </script>
    <script src="../scripts/script_contador.js"></script>
</body>
</html>
